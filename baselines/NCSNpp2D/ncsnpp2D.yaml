
project:
  name: complex-mri-ncsnpp2D-ve
  workdir: ./runs/ncsnpp2D
  seed: 0

data:
  batch_size: 8
  num_workers: 4
  crop_size: [256, 224]
  fixed_scale: 1.0e-6
  drop_slices: 5

model:
  in_channels: 2
  out_channels: 2
  image_size: 256
  base_channels: 96
  channel_mult: [1, 2, 2, 4]
  num_res_blocks: 4
  attn_resolutions: [32]
  dropout: 0.0
  embedding_size: 256
  fourier_scale: 16.0
  scale_by_sigma: true

sde:
  type: VE
  sigma_min: 1e-3
  sigma_max: 0.1

optim:
  lr: 1e-4
  beta1: 0.9
  beta2: 0.999
  weight_decay: 0.0
  grad_clip: 0.0

training:
  steps: 200000
  ema_decay: 0.999
  log_every: 50
  image_every: 500
  ckpt_every: 5000
  resume: null

wandb:
  enable: true
  project: complex-mri-diffusion-ncsnpp2D
  entity: null
  name: ncsnpp2D-ve-ri-2ch
  tags: [NCSN++, VE-SDE, complex-MRI, 2-channel]

visualization:
  fixed_noise_levels: [0.01, 0.05, 0.1]
  num_fixed_images: 4
